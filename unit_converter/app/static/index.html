<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit Converter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card p-4">
          <h4 class="fw-bold mb-3">Unit Converter</h4>

          <!-- Tabs -->
          <ul class="nav nav-underline mb-4">
            <li class="nav-item">
              <a class="nav-link active" href="#" onclick="switchTab('length', this); return false;">Length</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="switchTab('weight', this); return false;">Weight</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="switchTab('temperature', this); return false;">Temperature</a>
            </li>
          </ul>

          <!-- Form view -->
          <div id="form-view">
            <div class="mb-3">
              <label class="form-label fw-semibold" id="input-label">Enter the length to convert</label>
              <input type="number" class="form-control" id="num" placeholder="e.g. 20" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Unit to Convert from</label>
              <select class="form-select" id="from-unit"></select>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Unit to Convert to</label>
              <select class="form-select" id="to-unit"></select>
            </div>
            <button class="btn btn-dark" onclick="convert()">Convert</button>
            <p class="text-danger mt-3 mb-0 d-none" id="error-msg">Something went wrong. Please try again.</p>
          </div>

          <!-- Result view -->
          <div id="result-view" class="d-none">
            <p class="fw-semibold mb-1">Result of your calculation</p>
            <h2 class="fw-bold my-3" id="result-text"></h2>
            <button class="btn btn-outline-secondary" onclick="reset()">Reset</button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
    const units = {
      length: ["millimeter", "centimeter", "meter", "kilometer", "inch", "foot", "yard", "mile"],
      weight: ["milligram", "gram", "kilogram", "ounce", "pound"],
      temperature: ["celsius", "fahrenheit", "kelvin"]
    };

    const labels = {
      length: "Enter the length to convert",
      weight: "Enter the weight to convert",
      temperature: "Enter the temperature to convert"
    };

    let currentTab = "length";

    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll(".nav-underline .nav-link").forEach(a => a.classList.remove("active"));
      el.classList.add("active");
      document.getElementById("input-label").textContent = labels[tab];
      populateSelects(tab);
      reset();
    }

    function populateSelects(tab) {
      const fromEl = document.getElementById("from-unit");
      const toEl = document.getElementById("to-unit");
      fromEl.innerHTML = "";
      toEl.innerHTML = "";
      units[tab].forEach(u => {
        fromEl.innerHTML += `<option value="${u}">${capitalise(u)}</option>`;
        toEl.innerHTML += `<option value="${u}">${capitalise(u)}</option>`;
      });
      if (toEl.options.length > 1) toEl.selectedIndex = 1;
    }

    function capitalise(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    async function convert() {
      const num = document.getElementById("num").value;
      const fromUnit = document.getElementById("from-unit").value;
      const toUnit = document.getElementById("to-unit").value;
      const errorMsg = document.getElementById("error-msg");

      if (!num) return;
      errorMsg.classList.add("d-none");

      try {
        const res = await fetch(`/${currentTab}?num=${num}&from_unit=${fromUnit}&to_unit=${toUnit}`);
        if (!res.ok) throw new Error();
        const result = await res.json();

        document.getElementById("result-text").textContent =
          `${num} ${fromUnit} = ${parseFloat(result.toFixed(6))} ${toUnit}`;

        document.getElementById("form-view").classList.add("d-none");
        document.getElementById("result-view").classList.remove("d-none");
      } catch {
        errorMsg.classList.remove("d-none");
      }
    }

    function reset() {
      document.getElementById("num").value = "";
      document.getElementById("error-msg").classList.add("d-none");
      document.getElementById("form-view").classList.remove("d-none");
      document.getElementById("result-view").classList.add("d-none");
      document.getElementById("result-text").textContent = "";
    }

    // init
    populateSelects("length");
  </script>

</body>
</html>
